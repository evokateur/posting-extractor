description: "We are looking for an experienced developer to build a lightweight internal\
  \ web application that extracts structured data from Shopify order PDFs and prepares\
  \ it for operational use.\n\nOur company manages a high volume of event bookings.\
  \ Each booking contains important details (event date, time, address, child info,\
  \ etc.) that must currently be manually entered into our internal system.\n\nThis\
  \ process is time-consuming and error-prone.\n\nWe want to build a tool that:\n\
  - reads booking PDFs\n- extracts key fields (even when formats vary)\n- flags missing\
  \ or uncertain data\n- allows quick human review/edit\n- exports a clean Excel/CSV\
  \ file (for Google Sheets use)\n\n----------------------------------------\n\nPROJECT\
  \ GOAL\n\nBuild an AI-assisted + rule-based extraction tool that:\n\n1. Accepts\
  \ PDF uploads  \n2. Extracts structured booking data  \n3. Normalizes formats (dates,\
  \ times, etc.)  \n4. Flags missing or ambiguous fields  \n5. Provides a review/edit\
  \ interface  \n6. Exports a standardized CSV/Excel file  \n\nThis is NOT fully automated\
  \ — human validation is required before export.\n\n----------------------------------------\n\
  \nIMPORTANT CONTEXT\n\nThe PDFs contain mixed data:\n- sometimes structured (clear\
  \ labeled fields)\n- sometimes semi-structured\n- sometimes messy (manual/draft\
  \ orders)\n\nData can be in:\n- English or French\n- different date/time formats\n\
  - inconsistent wording\n\nThe solution must handle real-world messy data, not just\
  \ clean inputs.\n\n----------------------------------------\n\nCORE FEATURES (MVP)\n\
  \n- PDF upload (single file is fine for v1)\n- Data extraction (rules + AI)\n- Data\
  \ normalization (date, time, age, phone, etc.)\n- Validation & flagging system\n\
  - Review/edit interface\n- CSV/Excel export\n\n----------------------------------------\n\
  \nIMPORTANT\n\nWe are NOT looking for a system that relies only on AI guessing.\n\
  \nWe want a practical approach:\n- use rules when possible\n- use AI for messy/unstructured\
  \ text\n- clearly flag uncertainty\n- allow human review before export\n\n----------------------------------------\n\
  \nTO APPLY\n\nPlease include:\n\n1. Examples of similar work (PDF parsing, automation,\
  \ AI extraction, etc.)\n2. Your proposed tech stack\n3. How you would approach:\n\
  \   - extracting data from inconsistent PDFs\n   - handling French + English content\n\
  \   - validation and error handling\n4. Estimated timeline\n5. Fixed-price estimate\
  \ for MVP\n\n----------------------------------------\n\nWe are looking to start\
  \ quickly and build a solid MVP first.\n\nSee attached examples of:\n- target data\
  \ structure (Intranet screenshot)\n- 2 sample input PDFs (clean and messy formats)\n\
  \nBonus: If you include a brief outline of your extraction + validation approach,\
  \ it will be prioritized."
